<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Network Web Test</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">

  <h2>My Web App</h2>
  <p>Testing my ad network integration live:</p>

  <hr />

  <!-- 1. Banner Ad Container -->
  <h3>1. Banner Ad</h3>
  <div data-ad-slot="slot_banner_101" data-ad-format="banner"></div>

  <hr />

  <!-- 2. Native Ad Container -->
  <h3>2. Native Ad</h3>
  <div data-ad-slot="slot_native_102" data-ad-format="native"></div>

  <hr />

  <!-- 3. Rewarded Video Container -->
  <h3>3. Rewarded Video Ad</h3>
  <div data-ad-slot="slot_rewarded_103" data-ad-format="rewarded"></div>

  <hr />

  <!-- 4. Interstitial Overlay Container -->
  <h3>4. Interstitial Ad</h3>
  <!-- Auto-loads overlay when page loads -->
  <div data-ad-slot="slot_interstitial_104" data-ad-format="interstitial"></div>

  <!-- Include Your Lightweight Ad Network SDK -->
  <script src="https://chyke.online/sdk.js"></script>

</body>
</html>
