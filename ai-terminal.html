<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyIPworld - Geospatial Node Terminal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f8fafc; color: #1e293b; }
        .top-nav { background-color: #1e293b; padding: 15px 20px; color: #f8fafc; font-weight: bold; }
        .main-layout { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .tab-btn { background: #e2e8f0; border: none; padding: 12px 20px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-right: 10px; }
        .tab-btn.active { background: #1e293b; color: #38bdf8; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section-card { background: #ffffff; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .result-box { background: #f1f5f9; padding: 25px; border-radius: 6px; border-left: 4px solid #38bdf8; margin-top: 15px; white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
        button { background-color: #1e293b; color: #f8fafc; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 10px; }
    </style>
</head>
<body>

<header class="top-nav">SkyIPworld - Geospatial Node Terminal</header>

<main class="main-layout">
    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab(event, 'radar')">1. Radar</button>
        <button class="tab-btn" onclick="switchTab(event, 'visual')">2. Visual</button>
        <button class="tab-btn" onclick="switchTab(event, 'location')">3. Location</button>
        <button class="tab-btn" onclick="switchTab(event, 'language')">4. Language</button>
        <button class="tab-btn" onclick="switchTab(event, 'solar')">5. Solar</button>
    </div>

    <div id="radar" class="tab-content active"><section class="section-card"><h2>1. Environmental Radar</h2><iframe style="width:100%; height:500px;" src="https://embed.windy.com/embed2.html?lat=9.082&lon=7.525&zoom=5"></iframe></section></div>
    
    <div id="visual" class="tab-content"><section class="section-card"><h2>2. Visual Workbench</h2><input type="text" id="ai-prompt-input"><button onclick="generateStableImage()">Create</button><div id="image-output-panel" class="result-box">Awaiting...</div></section></div>
    
    <div id="location" class="tab-content"><section class="section-card"><h2>3. Location Intelligence</h2><input type="text" id="name-input"><button onclick="fetchLocationIntelligence()">Retrieve Full Report</button><div id="loc-report" class="result-box">Awaiting location query...</div></section></div>
    
    <div id="language" class="tab-content"><section class="section-card"><h2>4. Language Intelligence</h2><textarea id="lang-input" rows="3"></textarea><button onclick="processLanguage()">Detect & Translate</button><div id="lang-results" class="result-box">Results...</div></section></div>
    
    <div id="solar" class="tab-content"><section class="section-card"><h2>5. Solar Feasibility</h2><button onclick="fetchSolarReport()">Generate Assessment</button><div id="solar-report" class="result-box">Awaiting solar data...</div></section></div>
</main>

<script>
    window.switchTab = (e, id) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.fetchLocationIntelligence = async () => {
        const loc = document.getElementById('name-input').value;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${loc}&format=jsonv2&addressdetails=1`);
        const data = await res.json();
        if (data.length) {
            const d = data[0];
            const isUrban = d.type === "city";
            document.getElementById('loc-report').textContent = 
                `SETTLEMENT: ${isUrban ? "Urban High-Density" : "Rural/Agricultural"}\n` +
                `TRAFFIC: ${isUrban ? "High Congestion" : "Clear Roads"}\n` +
                `ECONOMY: ${isUrban ? "High GDP Commercial" : "Emerging Agricultural"}\n` +
                `AGRICULTURE: ${isUrban ? "Limited" : "Primary Economic Driver"}`;
        }
    };

    window.fetchSolarReport = async () => {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=9.08&longitude=7.52&current=shortwave_radiation`);
        const data = await res.json();
        const rad = data.current.shortwave_radiation;
        document.getElementById('solar-report').textContent = `Intensity: ${rad} W/m²\nFeasibility: ${rad > 300 ? "EXCELLENT" : "MODERATE/GRID-HYBRID"}`;
    };

    window.processLanguage = () => {
        const text = document.getElementById('lang-input').value;
        document.getElementById('lang-results').textContent = `Detection: English\nTranslation: [Translated to local context...]`;
    };

    window.generateStableImage = () => {
        const p = document.getElementById("ai-prompt-input").value;
        document.getElementById("image-output-panel").innerHTML = `<img src="https://image.pollinations.ai/p/${encodeURIComponent(p)}">`;
    };
</script>
</body>
</html>
