<body>

    <h1>Test Billing Integration</h1>
    <p>Click the button below to test the Paystack Visa/Verve checkout.</p>

    <!-- The button to trigger payment -->
    <button id="pay-button">Pay 1000 Naira</button>

    <!-- 1. Load your SDK -->
    <script src="your-sdk.js"></script>

    <!-- 2. Your trigger logic -->
    <script>
        // Ensure you have initialized Firebase in your project already
const db = firebase.firestore();

async function loadContentItem(docId) {
    try {
        const docRef = db.collection('content_items').doc(docId);
        const doc = await docRef.get();

        if (doc.exists) {
            const data = doc.data();
            // Update your UI with the data
            document.getElementById('item-title').innerText = data.title;
            document.getElementById('item-price').innerText = `Price: ₦${data.price / 100}`;
            
            // Set up the button with the data
            document.getElementById('pay-button').onclick = () => {
                initializePayment({
                    public_key: 'pk_live_d6916ad02026b04cac854617d2d798f915366364',
                    email: 'customer@example.com', // Get this from your user input
                    amount: data.price / 100, // Pass the actual price
                    onSuccess: (transaction) => {
                        console.log("Success! Unlock access to:", data.file_url);
                        // Redirect to or show the file_url here
                    }
                });
            };
        }
    } catch (error) {
        console.error("Error loading content:", error);
    }
}

// Call this with the document ID you created in Firestore
loadContentItem('ZsQdfmiprWopkv29EoYo'); 

    </script>

</body>
