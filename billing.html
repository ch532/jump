<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pay-to-Access Portal</title>
    <!-- Paystack SDK -->
    <script src="your-sdk.js"></script>
    <style>
        /* Your premium CSS here */
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { padding: 40px; max-width: 400px; margin: auto; border: 1px solid #ddd; border-radius: 20px; }
        input { width: 80%; padding: 15px; margin-bottom: 20px; }
        button { width: 80%; padding: 15px; background: gold; cursor: pointer; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Photography Course</h1>
        <p>Price: ₦4,000</p>
        <input type="email" id="user-email" placeholder="Enter your email">
        <button id="pay-button">Continue Payment Directly</button>
    </div>

    <script>
        // Hard-coded values - No database needed!
        const product = {
            price: 4000, 
            file_url: "https://your-download-link.com"
        };

        const payBtn = document.getElementById('pay-button');
        const emailInput = document.getElementById('user-email');

        // Auto-fill email
        emailInput.value = localStorage.getItem('user_email') || '';

        payBtn.onclick = () => {
            const email = emailInput.value;
            if (!email) return alert("Please enter email");
            localStorage.setItem('user_email', email);

            initializePayment({
                public_key: 'pk_live_d6916ad02026b04cac854617d2d798f915366364',
                email: email,
                amount: product.price,
                split_code: 'SPL_YOUR_SPLIT_CODE_HERE',
                onSuccess: () => {
                    alert("Payment successful!");
                    window.location.href = product.file_url;
                }
            });
        };
    </script>
</body>
</html>
