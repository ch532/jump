<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR-SKYE PREMIUM</title>
    
    <!-- Google Fonts for Premium Feel -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; color: #1a1a1a; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        #pay-button { 
            width: 100%; padding: 18px; border: none; border-radius: 12px; 
            background: linear-gradient(135deg, #c5a059, #e6c885); color: white; 
            font-weight: 600; font-size: 16px; cursor: pointer; transition: transform 0.2s;
        }
        #pay-button:hover { transform: scale(1.02); }
    </style>

    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.x.x/firebase-firestore-compat.js"></script>
    <script src="your-sdk.js"></script>
</head>
<body>

    <div class="card">
        <h1 id="item-title">Loading...</h1>
        <p id="item-price"></p>
        <input type="email" id="user-email" placeholder="Enter your email" required>
        <button id="pay-button" style="display:none;">Continue Payment Directly</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAkEwctSLriZQrHSkX6aJDTf4zH9mTsAeQ",
          authDomain: "air-skye.firebaseapp.com",
          projectId: "air-skye",
          storageBucket: "air-skye.appspot.com",
          messagingSenderId: "46181700573",
          appId: "1:46181700573:web:8eb847c0e595ca2226dc34",
          measurementId: "G-MDCZE04PB0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadContentItem(docId) {
            try {
                const doc = await db.collection('content_items').doc(docId).get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('item-title').innerText = data.title;
                    document.getElementById('item-price').innerText = `Price: ₦${(data.price / 100).toLocaleString()}`;
                    
                    const payBtn = document.getElementById('pay-button');
                    const emailInput = document.getElementById('user-email');
                    payBtn.style.display = 'block';
                    
                    emailInput.value = localStorage.getItem('user_email') || '';
                    
                    payBtn.onclick = () => {
                        const email = emailInput.value;
                        if (!email) return alert("Please enter your email.");
                        localStorage.setItem('user_email', email);

                        initializePayment({
                            public_key: 'pk_live_d6916ad02026b04cac854617d2d798f915366364',
                            email: email,
                            amount: data.price / 100, 
                            split_code: 'SPL_YOUR_SPLIT_CODE_HERE',
                            onSuccess: (t) => { alert("Success!"); window.location.href = data.file_url; }
                        });
                    };
                }
            } catch (e) { console.error(e); }
        }

        loadContentItem('ZsQdfmiprWopkv29EoYo'); 
    </script>

<!-- Eruda Mobile Console -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>


</body>
</html>
