<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay-to-Access Portal</title>
    
    <!-- Firebase SDK (Compatibility versions) -->
    <script src="https://www.gstatic.com/firebasejs/10.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.x.x/firebase-firestore-compat.js"></script>
    
    <!-- Your SDK -->
    <script src="your-sdk.js"></script>
</head>
<body>

    <!-- UI Elements -->
    <h1 id="item-title">Loading content...</h1>
    <p id="item-price"></p>
    
    <!-- Input for user email -->
    <input type="email" id="user-email" placeholder="Enter your email" required>
    <br><br>
    
    <button id="pay-button" style="display:none;">Pay Now</button>

    <script>
        // 1. Initialize Firebase with your config
        const firebaseConfig = {
          apiKey: "AIzaSyAkEwctSLriZQrHSkX6aJDTf4zH9mTsAeQ",
          authDomain: "air-skye.firebaseapp.com",
          projectId: "air-skye",
          storageBucket: "air-skye.appspot.com",
          messagingSenderId: "46181700573",
          appId: "1:46181700573:web:8eb847c0e595ca2226dc34",
          measurementId: "G-MDCZE04PB0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. Logic to Load Data, Auto-fill Email, and Trigger Payment
        async function loadContentItem(docId) {
            try {
                const docRef = db.collection('content_items').doc(docId);
                const doc = await docRef.get();

                if (doc.exists) {
                    const data = doc.data();
                    
                    // UI Setup
                    document.getElementById('item-title').innerText = data.title;
                    document.getElementById('item-price').innerText = `Price: ₦${data.price / 100}`;
                    const payBtn = document.getElementById('pay-button');
                    const emailInput = document.getElementById('user-email');
                    payBtn.style.display = 'block';
                    
                    // Auto-fill email from localStorage if it exists
                    const savedEmail = localStorage.getItem('user_email');
                    if (savedEmail) {
                        emailInput.value = savedEmail;
                    }
                    
                    // Setup Payment Trigger
                    payBtn.onclick = () => {
                        const email = emailInput.value;
                        if (!email) {
                            alert("Please enter your email.");
                            return;
                        }

                        // Save email to localStorage for next time
                        localStorage.setItem('user_email', email);

                        initializePayment({
                            public_key: 'pk_live_d6916ad02026b04cac854617d2d798f915366364',
                            email: email,
                            amount: data.price / 100, 
                            onSuccess: (transaction) => {
                                alert("Payment successful!");
                                // Redirect to the content URL stored in Firestore
                                window.location.href = data.file_url;
                            }
                        });
                    };
                }
            } catch (error) {
                console.error("Error loading content:", error);
            }
        }

        // Initialize with your document ID
        loadContentItem('ZsQdfmiprWopkv29EoYo'); 
    </script>

</body>
</html>
