<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebRTC Distributed Autonomous Runtime</title>
    <style>
        body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 20px; }
        .box { border: 2px solid #000; padding: 20px; border-radius: 8px; }
        #log { font-size: 0.8em; background: #eee; padding: 10px; margin-top: 15px; height: 120px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="box">
    <h1>Autonomous Runtime (WebRTC Mode)</h1>
    <p>Status: <span id="status">Ready</span></p>
    <button id="action-btn" onclick="triggerCrash()">Execute Task</button>
    <div id="log">System: Initializing WebRTC...</div>
</div>

<script>
    let peerConnection;
    let dataChannel;

    // --- 1. WEBRTC SIGNALING & SETUP ---
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    peerConnection = new RTCPeerConnection(config);

    // Setup Data Channel (for peer-to-peer patch synthesis)
    dataChannel = peerConnection.createDataChannel("synthesis-channel");
    dataChannel.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'PATCH_REQUEST') {
            // WORKER ROLE: Generate fix locally
            const patch = { newText: "Task Fixed via P2P", msg: "Patch generated by Peer" };
            dataChannel.send(JSON.stringify({ type: 'PATCH_RESULT', patch }));
        }
    };

    // --- 2. WATCHDOG: Global Monitor ---
    window.addEventListener('error', (e) => {
        log("Error caught: " + e.message);
        requestPatchFromPeer(e.message);
    });

    // --- 3. DISTRIBUTED SYNTHESIS (The P2P Request) ---
    function requestPatchFromPeer(errorMsg) {
        if (dataChannel.readyState !== 'open') {
            log("No active peers. Self-healing failed.");
            return;
        }
        log("Broadcasting synthesis request to peers...");
        dataChannel.send(JSON.stringify({ type: 'PATCH_REQUEST', errorMsg }));
    }

    // --- 4. PATCHER: Apply Result ---
    dataChannel.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'PATCH_RESULT') {
            applyPatch(data.patch);
        }
    };

    function applyPatch(patch) {
        const btn = document.getElementById('action-btn');
        btn.innerText = patch.newText;
        document.getElementById('status').innerText = "Fixed via Peer";
        log(patch.msg);
    }

    // --- 5. TASK ---
    function triggerCrash() {
        document.getElementById('status').innerText = "Crashing...";
        nonExistentFunction(); 
    }

    function log(m) { document.getElementById('log').innerHTML += `<br>${m}`; }
</script>
</body>
</html>
