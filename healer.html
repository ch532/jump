<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Autonomous Runtime | WebRTC P2P</title>
    <!-- Include PeerJS library -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 20px; }
        .box { border: 2px solid #000; padding: 20px; border-radius: 8px; }
        #log { font-size: 0.8em; background: #eee; padding: 10px; margin-top: 15px; height: 150px; overflow-y: auto; }
        button { margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Autonomous Runtime (WebRTC)</h1>
    <p>Status: <span id="status">Initializing...</span></p>
    <button id="action-btn" onclick="triggerCrash()">Execute Task</button>
    
    <div style="margin-top: 20px;">
        <input type="text" id="peerIdInput" placeholder="Enter Peer ID to connect">
        <button onclick="handleManualConnect()">Connect to Peer</button>
    </div>
    
    <div id="log">System: Initializing PeerJS...</div>
</div>

<script>
    // --- 1. PEERJS SETUP ---
    const peer = new Peer();
    let conn;

    peer.on('open', (id) => {
        log("System: PeerJS initialized. My ID: " + id);
    });

    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
    });

    function handleManualConnect() {
        const targetId = document.getElementById('peerIdInput').value;
        conn = peer.connect(targetId);
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            log("System: Peer connected. Status: Operational.");
            document.getElementById('status').innerText = "Connected to Peer";
        });
        
        conn.on('data', (data) => {
            if (data.type === 'PATCH_REQUEST') {
                log("Worker: Generating patch for error: " + data.errorMsg);
                const patch = { newText: "Task Fixed via P2P", msg: "Patch generated by Peer" };
                conn.send({ type: 'PATCH_RESULT', patch });
            } else if (data.type === 'PATCH_RESULT') {
                applyPatch(data.patch);
            }
        });
    }

    // --- 2. WATCHDOG & SYNTHESIS ---
    window.addEventListener('error', (e) => {
        log("Error caught: " + e.message);
        if (conn && conn.open) {
            log("Broadcasting synthesis request to peer...");
            conn.send({ type: 'PATCH_REQUEST', errorMsg: e.message });
        } else {
            log("No active peers. Self-healing failed.");
        }
    });

    // --- 3. PATCHER ---
    function applyPatch(patch) {
        const btn = document.getElementById('action-btn');
        btn.innerText = patch.newText;
        document.getElementById('status').innerText = "Fixed via Peer";
        log(patch.msg);
    }

    function triggerCrash() {
        document.getElementById('status').innerText = "Crashing...";
        nonExistentFunction(); // Intentionally crashing
    }

    function log(m) { 
        const logEl = document.getElementById('log');
        logEl.innerHTML += `<br>${m}`;
        logEl.scrollTop = logEl.scrollHeight;
    }
</script>
</body>
</html>
