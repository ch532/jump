<script>
async function loadFeed() {
    const rssUrl = "https://www.bellanaija.com/event/feed/";
    const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
    
    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        const feedContainer = document.getElementById('my-native-feed');
        feedContainer.innerHTML = ''; 

        data.items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'news-item';
            div.innerHTML = `<h3>${item.title}</h3><p>${item.description}</p><a href="${item.link}" target="_blank" rel="noopener">Read More</a>`;
            feedContainer.appendChild(div);

            // AUTO AD SPACE 3: Middle of feed (after article 2)
            if (index === 1) {
                injectEmptyAutoAdSpace();
            }

            // AUTO AD SPACE 4: Middle of feed (after article 6)
            if (index === 5) {
                injectEmptyAutoAdSpace();
            }

            // AUTO AD SPACE 5: Middle of feed (after article 10)
            if (index === 9) {
                injectEmptyAutoAdSpace();
            }

            // MANUAL IN-FEED AD: Injected after every 4 articles using your exact ad code
            if ((index + 1) % 4 === 0) {
                const adDiv = document.createElement('div');
                adDiv.className = 'adsense-infeed-space';
                adDiv.innerHTML = `
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-format="fluid"
                         data-ad-layout-key="-6r+di+5g-2m-8y"
                         data-ad-client="ca-pub-8877351541430254"
                         data-ad-slot="5656610761"></ins>
                `;
                feedContainer.appendChild(adDiv);
                
                // Initialize the in-feed ad
                try {
                    (adsbygoogle = window.adsbygoogle || []).push({});
                } catch (e) {
                    console.log("In-feed ad slot initialized.");
                }
            }
        });
    } catch (e) {
        document.getElementById('my-native-feed').innerHTML = "Unable to load feed.";
    }
}

// Helper to inject empty containers for Google's Auto Ads to naturally target
function injectEmptyAutoAdSpace() {
    const feedContainer = document.getElementById('my-native-feed');
    const adDiv = document.createElement('div');
    adDiv.className = 'auto-ad-placeholder';
    feedContainer.appendChild(adDiv);
}

loadFeed();
</script>
