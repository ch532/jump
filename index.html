<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connectgold AI Chat</title>
    <style>
        /* Remove default margins and padding from the body */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: #f9f9f9;
        }

        /* Container to hold the iframe and ensure it scales correctly */
        .chat-container {
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <iframe 
            src="https://app.relevanceai.com/agents/bcbe5a/b00cfd1a-f6fc-4d2c-a931-cd0c32dc3f80/9566649f-0dd3-4a63-bfe2-d0bf50c3522b/embed-chat?hide_tool_steps=false&hide_file_uploads=false&hide_conversation_list=false&bubble_style=agent&primary_color=%23685FFF&bubble_icon=pd%2Fchat&input_placeholder_text=Type+your+message...&hide_logo=false&hide_description=false" 
            allow="microphone">
        </iframe>
    </div>

</body>
</html>
