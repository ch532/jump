<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goldtech TV Network</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #020202; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }

        /* Video Screen Layer */
        .tv-frame { position: relative; width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100% !important; height: 100% !important; object-fit: contain; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* The Click Shield to handle HUD triggering smoothly on mobile */
        .click-shield { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }

        /* "Tap to Play" Wake Up Overlay Hint */
        .wake-overlay {
            position: absolute; z-index: 15; background: rgba(0,0,0,0.8);
            padding: 15px 30px; border: 2px dashed #FFD700; border-radius: 30px;
            font-weight: bold; color: #FFD700; letter-spacing: 1px; pointer-events: none;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); transition: opacity 0.3s ease;
        }

        /* Top Brand Header */
        .brand-header {
            position: absolute; top: 30px; left: 30px; z-index: 20;
            display: flex; align-items: center; gap: 15px;
            background: rgba(0, 0, 0, 0.6); padding: 10px 20px; border-radius: 50px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .brand-logo { height: 40px; width: auto; object-fit: contain; }
        .brand-name { font-size: 1.4rem; font-weight: 800; color: #FFD700; letter-spacing: 1.5px; text-transform: uppercase; }

        /* The Hub Remote Control UI (Sidebar Matrix) */
        .remote-control {
            position: absolute; top: 30px; right: 30px; z-index: 20;
            display: flex; flex-direction: column; gap: 12px;
            background: rgba(0, 0, 0, 0.75); padding: 20px; border-radius: 12px; 
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 215, 0, 0.15);
            max-height: 80vh; width: 280px; overflow-y: auto;
        }
        
        /* Custom scrollbar styling for the station menu */
        .remote-control::-webkit-scrollbar { width: 4px; }
        .remote-control::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }

        .remote-title { font-size: 0.8rem; font-weight: bold; color: #aaa; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 5px; }
        .category-heading { color: #FFD700; font-size: 0.75rem; font-weight: bold; margin-top: 10px; margin-bottom: 4px; letter-spacing: 1px; border-bottom: 1px solid rgba(255, 215, 0, 0.15); padding-bottom: 2px; }
        
        .btn-hub {
            background: rgba(25, 25, 25, 0.8); border: 1px solid rgba(255,255,255,0.08);
            color: #fff; padding: 10px 15px; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 0.85rem; text-align: left; width: 100%;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 2px;
        }
        .btn-hub:hover { background: rgba(40, 40, 40, 0.9); border-color: rgba(255, 215, 0, 0.4); }
        .btn-hub.active { background: #FFD700; color: #000; font-weight: bold; border-color: #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }

        /* Heads Up Display (HUD) Info Box */
        .hud-overlay {
            position: absolute; bottom: 30px; left: 30px; right: 30px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(12px);
            border-left: 6px solid #FFD700; padding: 25px 30px; border-radius: 6px;
            z-index: 20; opacity: 0; transition: opacity 0.4s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9); pointer-events: none;
        }
        .hud-overlay.visible { opacity: 1; }
        .hud-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .hud-provider { font-size: 0.85rem; color: #FFD700; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .hud-title { font-size: 1.6rem; font-weight: 700; color: #fff; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        
        /* Goldtech Broadcast Progress Line */
        .timeline-container { width: 100%; height: 5px; background: rgba(255,255,255,0.15); border-radius: 3px; margin-top: 15px; overflow: hidden; }
        .timeline-fill { height: 100%; background: #FFD700; width: 0%; transition: width 1000ms linear; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <div class="tv-frame">
        <div class="click-shield" onclick="handleScreenTap()"></div>
        
        <div class="wake-overlay" id="wake-prompt">⚠️ TAP SCREEN TO WAKE LIVE TV</div>
        
        <video id="sovereign-core-player" autoplay muted playsinline></video>

        <div class="brand-header">
            <img class="brand-logo" src="https://connectgold.sbs/gold-2.png" alt="Goldtech Logo">
            <span class="brand-name">Goldtech</span>
        </div>

        <div class="remote-control">
            <div class="remote-title">Goldtech Master Grid</div>
            
            <div class="category-heading">🎬 MOVIES</div>
            <button class="btn-hub active" onclick="tuneToChannel('movie_action', this)">🔥 Action Cinema HD</button>
            <button class="btn-hub" onclick="tuneToChannel('movie_scifi', this)">🚀 Sci-Fi Zone</button>
            <button class="btn-hub" onclick="tuneToChannel('movie_classic', this)">🎞️ Hollywood Classics</button>
            <button class="btn-hub" onclick="tuneToChannel('movie_nollywood', this)">🇳🇬 Nollywood Classic</button>

            <div class="category-heading">⚽ SPORTS</div>
            <button class="btn-hub" onclick="tuneToChannel('sports_footy1', this)">🏆 FIFA+ Soccer Live</button>
            <button class="btn-hub" onclick="tuneToChannel('sports_footy2', this)">👑 Real Madrid TV</button>
            <button class="btn-hub" onclick="tuneToChannel('sports_racing', this)">🏎️ Red Bull Action</button>
            <button class="btn-hub" onclick="tuneToChannel('sports_combat', this)">🥊 Fight Network</button>

            <div class="category-heading">📰 WORLD NEWS</div>
            <button class="btn-hub" onclick="tuneToChannel('news_global', this)">🌍 Al Jazeera Live HD</button>
            <button class="btn-hub" onclick="tuneToChannel('news_africa', this)">🇳🇬 Africanews Live</button>
            <button class="btn-hub" onclick="tuneToChannel('news_finance', this)">📊 Bloomberg Finance</button>

            <div class="category-heading">🎵 MUSIC NETWORKS</div>
            <button class="btn-hub" onclick="tuneToChannel('music_global', this)">🎧 Clubbing TV 24/7</button>
            <button class="btn-hub" onclick="tuneToChannel('music_afro', this)">🇳🇬 Afro Pop Streams</button>

            <div class="category-heading">✨ VARIETY MIXED</div>
            <button class="btn-hub" onclick="tuneToChannel('mixed_space', this)">🌌 NASA Deep Space</button>
            <button class="btn-hub" onclick="tuneToChannel('mixed_docs', this)">🌿 Plex Documentary</button>
            <button class="btn-hub" onclick="tuneToChannel('mixed_gaming', this)">🎮 IGN Gaming Zone</button>
        </div>

        <div class="hud-overlay" id="tv-hud">
            <div class="hud-meta">
                <span class="hud-provider" id="meta-provider">Connecting...</span>
                <span id="meta-clock" style="color: #FFD700; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px;">● LIVE BROADCAST</span>
            </div>
            <div class="hud-title" id="meta-title">Syncing Matrix Streams...</div>
            <div class="timeline-container">
                <div class="timeline-fill" id="meta-progress"></div>
            </div>
        </div>
    </div>

    <script>
        // High-SLA developer networks intentionally set with global cross-origin allowances
        const goldtechChannels = {
            movie_action: {
                title: "Sintel Cinematic Master Cut (Action/Adventure)",
                url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8"
            },
            movie_scifi: {
                title: "DUST Sci-Fi Space Cinema • Live 24/7",
                url: "https://watchdust.flex.fullscreen.tv/watchdust/live/manifest.m3u8"
            },
            movie_classic: {
                title: "Goldtech Hollywood Classics • Live Cinema",
                url: "https://retrocrush-cinedigm.amagi.tv/playlist.m3u8"
            },
            movie_nollywood: {
                title: "Nollywood Cinema Box (Africa Movie Net)",
                url: "https://amg01407-africamovienetw-africamovienetwork-aym-us.amagi.tv/playlist.m3u8"
            },
            sports_footy1: {
                title: "Sovereign Football TV (Live FIFA+ Soccer Network)",
                url: "https://ftv-fifaplus-3-us.samsung.wurl.com/manifest/playlist.m3u8"
            },
            sports_footy2: {
                title: "Real Madrid TV (Official Football Club Stream)",
                url: "https://rmtv-es-samsung.amagi.tv/playlist.m3u8"
            },
            sports_racing: {
                title: "Red Bull TV Live Action Sports Channel",
                url: "https://rbmn-live.akamaized.net/hls/live/590964/BoB/master.m3u8"
            },
            sports_combat: {
                title: "Hard Knocks Fighting Championship • 24/7 Combat",
                url: "https://fightnetwork-cinedigm.amagi.tv/playlist.m3u8"
            },
            news_global: {
                title: "Al Jazeera English HD (Global News Live)",
                url: "https://live-am.akamaized.net/aljazeera/english/core.m3u8"
            },
            news_africa: {
                title: "Africanews International Broadcast • Live From Region",
                url: "https://africanews-africanews-1-fr.samsung.wurl.com/manifest/playlist.m3u8"
            },
            news_finance: {
                title: "Bloomberg Financial Global Network Live",
                url: "https://bloomberg.vnative.com/bloomberg/live/manifest.m3u8"
            },
            music_global: {
                title: "Clubbing TV (24/7 Electronic & Festival Music)",
                url: "https://clubbingtv-rakuten.amagi.tv/playlist.m3u8"
            },
            music_afro: {
                title: "Trace Afrik Network (Premium Afro Hits)",
                url: "https://trace-traceafrik-samsung.amagi.tv/playlist.m3u8"
            },
            mixed_space: {
                title: "NASA TV HD Mission Control Operations Live",
                url: "https://ntv1.akamaized.net/hls/live/2034057/NASA-NTV1-Public/master.m3u8"
            },
            mixed_docs: {
                title: "Plex Documentaries & True Life Channels",
                url: "https://amg01201-cinedigm-realmadrid-plex.amagi.tv/playlist.m3u8"
            },
            mixed_gaming: {
                title: "IGN Live (Gaming, Esports & Geek Culture)",
                url: "https://ign-ign-1-us.samsung.wurl.com/manifest/playlist.m3u8"
            }
        };

        const player = document.getElementById('sovereign-core-player');
        let hlsEngine = null;
        let hudTimeout;
        let progressInterval;
        let virtualTimeTracker = 0;

        function handleScreenTap() {
            // Hide the wake overlay banner text indicator
            document.getElementById('wake-prompt').style.opacity = '0';
            
            // Re-trigger and toggle HUD dashboard layout overlay
            toggleHUD();
            
            // Explicitly force modern hardware processing vectors to play active frame elements
            player.play().catch(() => {});
        }

        function tuneToChannel(channelKey, UI_Button) {
            triggerHUD();
            
            // Sync structural selection styles across button arrays
            document.querySelectorAll('.btn-hub').forEach(btn => btn.classList.remove('active'));
            if (UI_Button) UI_Button.classList.add('active');

            const targetFeed = goldtechChannels[channelKey];
            document.getElementById('meta-provider').innerText = `GOLDTECH • ${channelKey.toUpperCase()}`;
            document.getElementById('meta-title').innerText = targetFeed.title;

            if (hlsEngine) {
                hlsEngine.destroy();
            }

            if (Hls.isSupported()) {
                hlsEngine = new Hls({ maxMaxBufferLength: 10 });
                hlsEngine.loadSource(targetFeed.url);
                hlsEngine.attachMedia(player);
                hlsEngine.on(Hls.Events.MANIFEST_PARSED, () => {
                    player.play().catch(() => {});
                });
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = targetFeed.url;
                player.addEventListener('loadedmetadata', () => {
                    player.play().catch(() => {});
                });
            }

            resetVirtualProgressTracker();
        }

        function resetVirtualProgressTracker() {
            clearInterval(progressInterval);
            virtualTimeTracker = Math.floor(Math.random() * 50) + 10; 
            
            progressInterval = setInterval(() => {
                virtualTimeTracker += 0.15; 
                if (virtualTimeTracker >= 100) virtualTimeTracker = 0; 
                document.getElementById('meta-progress').style.width = `${virtualTimeTracker}%`;
            }, 1000);
        }

        function triggerHUD() {
            const hud = document.getElementById('tv-hud');
            hud.classList.add('visible');
            clearTimeout(hudTimeout);
            hudTimeout = setTimeout(() => {
                hud.classList.remove('visible');
            }, 5000); 
        }

        function toggleHUD() {
            const hud = document.getElementById('tv-hud');
            if (hud.classList.contains('visible')) {
                hud.classList.remove('visible');
            } else {
                triggerHUD();
            }
        }

        // Initialize with Action Cinema automatically on layout execution load configurations
        window.onload = () => {
            tuneToChannel('movie_action', document.querySelector('.btn-hub'));
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
    
</body>
</html>
