<!-- NATIVE FEED LOGIC -->
<script>
async function loadFeed() {
    const rssUrl = "https://www.bellanaija.com/event/feed/";
    const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
    
    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        const feedContainer = document.getElementById('my-native-feed');
        feedContainer.innerHTML = ''; 

        data.items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'news-item';
            div.innerHTML = `<h3>${item.title}</h3><p>${item.description}</p><a href="${item.link}">Read More</a>`;
            feedContainer.appendChild(div);

            if ((index + 1) % 4 === 0) {
                const adDiv = document.createElement('div');
                adDiv.className = 'adsense-infeed-space';
                adDiv.innerHTML = `
                    <ins class="adsbygoogle"
                         style="display:block; text-align:center;"
                         data-ad-layout="in-article"
                         data-ad-format="fluid"
                         data-ad-client="ca-pub-8877351541430254"
                         data-ad-slot="6686741548"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script>
                `;
                feedContainer.appendChild(adDiv);
            }
        });
    } catch (e) {
        document.getElementById('my-native-feed').innerHTML = "Unable to load feed.";
    }
}
loadFeed();
</script>

    </p>

        <button onclick="acceptSiteCookies()" style="background: #38bdf8; color: #1e293b; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px;">
            Accept Cookies
        </button>

</div>

<script>
    window.addEventListener('DOMContentLoaded', function() {
        if (!getCookie("skyip_user_consent")) {
            document.getElementById('cookie-consent-banner').style.display = 'block';
        }
    });
    function setCookie(name, value, days) {
        let expires = "";
        if (days) {
            let date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "")  + expires + "; path=/; SameSite=Lax";
    }
    function getCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) == ' ') c = c.substring(1,c.length);
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
        }
        return null;
    }
    function acceptSiteCookies() {
        setCookie("skyip_user_consent", "accepted", 30);
        document.getElementById('cookie-consent-banner').style.display = 'none';
    }
</script>
