<!DOCTYPE html>
<html>
<head>
    <!-- Eruda Console for Mobile Debugging -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        body { transition: background 0.4s; padding: 20px; font-family: sans-serif; }
        
        #target-zone {
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none; touch-action: none; 
            height: 300px; border: 2px dashed #000; padding: 20px;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
        }

        /* Mode Styles */
        .DEFAULT { background: #fff; }
        .EXPLORATION_FLOW { background: #fff3cd; border: 2px solid #ffc107; }
        .DEEP_FOCUS { background: #d1ecf1; transform: scale(1.02); }
        .SYSTEM_CONFIG { background: #343a40; color: #fff; padding: 40px; }
    </style>
</head>
<body>
    <div id="ui-container">
        <h1>Autonomous Mobile Runtime</h1>
        <div id="target-zone">Long-press to cycle through Intent Modes.</div>
    </div>

    <script>
        const worker = new Worker('worker.js');
        let touchTarget = null;
        let touchStartTime = 0;
        let isHolding = false;

        const targetZone = document.getElementById('target-zone');

        targetZone.addEventListener('contextmenu', (e) => e.preventDefault());

        targetZone.addEventListener('touchstart', (e) => {
            console.log("Touch detected!");
            touchTarget = e.target.id;
            touchStartTime = Date.now();
            isHolding = true;
        }, { passive: false });

        targetZone.addEventListener('touchend', () => {
            console.log("Touch ended.");
            isHolding = false;
            // Reset to default on release
            document.body.className = "DEFAULT";
        }, { passive: false });

        // Intent Orchestrator
        setInterval(() => {
            if (isHolding) {
                console.log("Holding... Duration:", Date.now() - touchStartTime);
                worker.postMessage({ 
                    type: 'CAPTURE_INTENT', 
                    data: { dwellDuration: Date.now() - touchStartTime, target: touchTarget } 
                });
            }
        }, 500);

        // UI Rendering Agent
        worker.onmessage = (e) => {
            if (e.data.type === 'APPLY_LAYOUT') {
                console.log("Layout received:", e.data.layout.mode);
                document.body.className = e.data.layout.mode;
            }
        };
    </script>
</body>
</html>
