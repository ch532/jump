<!DOCTYPE html>
<html>
<head>
    <style>
        #target-zone {
            /* CSS to block native browser interference */
            -webkit-user-select: none; 
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: none; 
            
            /* Visual feedback */
            height: 300px; 
            border: 2px dashed #000; 
            padding: 20px;
        }

        .DEFAULT { background: #fff; }
        .DEEP_FOCUS { background: #e0e0e0; transform: scale(1.02); }
    </style>
</head>
<body>
    <div id="ui-container">
        <h1>Autonomous Mobile Runtime</h1>
        <div id="target-zone">
            Long-press here to trigger Deep Focus.
        </div>
    </div>

    <script>
        const worker = new Worker('worker.js');
        let touchTarget = null;
        let touchStartTime = 0;
        let isHolding = false;

        const targetZone = document.getElementById('target-zone');

        // Prevent native context menu (Download/Share/Print)
        targetZone.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        targetZone.addEventListener('touchstart', (e) => {
            touchTarget = e.target.id;
            touchStartTime = Date.now();
            isHolding = true;
        });

        targetZone.addEventListener('touchend', () => {
            isHolding = false;
        });

        // Intent Orchestrator
        setInterval(() => {
            if (isHolding) {
                worker.postMessage({ 
                    type: 'CAPTURE_INTENT', 
                    data: { 
                        dwellDuration: Date.now() - touchStartTime, 
                        target: touchTarget 
                    } 
                });
            }
        }, 500);

        // UI Rendering Agent
        worker.onmessage = (e) => {
            if (e.data.type === 'APPLY_LAYOUT') {
                document.body.className = e.data.layout.mode;
            }
        };
    </script>
</body>
</html>
