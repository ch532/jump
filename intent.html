<!DOCTYPE html>
<html>
<head>
    <style>
        .DEFAULT { background: #fff; }
        .DEEP_FOCUS { background: #e0e0e0; transform: scale(1.02); }

        #target-zone {
    /* Prevents the text selection menu from appearing */
    -webkit-user-select: none; 
    user-select: none;
    
    /* Prevents the browser from showing the context menu */
    -webkit-touch-callout: none;
    
    /* Ensures the element handles touch events directly */
    touch-action: none; 
}
    </style>
</head>
<body>
    <div id="ui-container">
        <h1>Autonomous Mobile Runtime</h1>
        <div id="target-zone" style="height: 300px; border: 2px dashed #000; padding: 20px;">
            Long-press here to trigger Deep Focus.
        </div>
    </div>

    <script>
        const worker = new Worker('worker.js');
        let touchTarget = null;
        let touchStartTime = 0;
        let isHolding = false;

        document.addEventListener('touchstart', (e) => {
            touchTarget = e.target.id || "body";
            touchStartTime = Date.now();
            isHolding = true;
        });

        document.addEventListener('touchend', () => {
            isHolding = false;
        });

        // Intent Orchestrator
        setInterval(() => {
            if (isHolding) {
                worker.postMessage({ 
                    type: 'CAPTURE_INTENT', 
                    data: { 
                        dwellDuration: Date.now() - touchStartTime, 
                        target: touchTarget 
                    } 
                });
            }
        }, 500);

        // UI Rendering Agent
        worker.onmessage = (e) => {
            if (e.data.type === 'APPLY_LAYOUT') {
                document.body.className = e.data.layout.mode;
            }
        };
    </script>
</body>
</html>
