<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        body { transition: background 0.4s; font-family: sans-serif; }
        
        #nav-bar { height: 50px; background: #333; color: white; transition: all 0.4s; overflow: hidden; }
        .SYSTEM_CONFIG #nav-bar { height: 0; opacity: 0; }

        #content-text { font-size: 16px; transition: all 0.4s; padding: 20px; }
        .DEEP_FOCUS #content-text { font-size: 32px; font-weight: bold; color: #007bff; }

        #target-zone {
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none; touch-action: none; 
            height: 200px; border: 2px dashed #000; margin: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        /* Menu Styles */
        #action-menu {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #f9f9f9;
            border: 1px solid #ddd; padding: 15px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000;
            width: 80%; max-width: 300px;
        }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { padding: 10px; border: none; background: #e0e0e0; border-radius: 5px; }
        .close-btn { width: 100%; margin-top: 10px; background: #ff5e5e; color: white; }
    </style>
</head>
<body>
    <div id="nav-bar">Navigation Menu</div>
    <div id="content-text" contenteditable="true">Select this text to format it using the menu.</div>
    <div id="target-zone">Long-press to trigger Intent Menu.</div>

    <div id="action-menu">
        <h3>Browser Actions</h3>
        <div class="menu-grid">
            <button onclick="performAction('COPY')">Copy</button>
            <button onclick="performAction('SHARE')">Share</button>
            <button onclick="performAction('REFRESH')">Refresh</button>
            <button onclick="performAction('SELECT_ALL')">Select All</button>
        </div>
        <h3>Formatting</h3>
        <div class="menu-grid">
            <button onclick="performAction('BOLD')">Bold</button>
            <button onclick="performAction('ITALIC')">Italic</button>
            <button onclick="performAction('COLOR')">Color</button>
            <button onclick="performAction('SIZE')">Size</button>
        </div>
        <button class="close-btn" onclick="closeMenu()">Close</button>
    </div>

    <script>
        const worker = new Worker('worker.js');
        let isHolding = false;
        let touchStartTime = 0;

        const targetZone = document.getElementById('target-zone');

        targetZone.addEventListener('touchstart', () => { isHolding = true; touchStartTime = Date.now(); }, { passive: false });
        targetZone.addEventListener('touchend', () => { isHolding = false; document.body.className = "DEFAULT"; }, { passive: false });

        setInterval(() => {
            if (isHolding) {
                worker.postMessage({ type: 'CAPTURE_INTENT', data: { dwellDuration: Date.now() - touchStartTime, target: 'target-zone' } });
            }
        }, 500);

        worker.onmessage = (e) => {
            if (e.data.type === 'APPLY_LAYOUT') {
                document.body.className = e.data.layout.mode;
                if (e.data.layout.action === 'OPEN_MENU') document.getElementById('action-menu').style.display = 'block';
            }
        };

        function closeMenu() { document.getElementById('action-menu').style.display = 'none'; }
        function performAction(type) {
            switch(type) {
                case 'COPY': document.execCommand('copy'); break;
                case 'SELECT_ALL': document.execCommand('selectAll', false, null); break;
                case 'REFRESH': location.reload(); break;
                case 'SHARE': if (navigator.share) navigator.share({title: document.title, url: window.location.href}); break;
                case 'BOLD': document.execCommand('bold', false, null); break;
                case 'ITALIC': document.execCommand('italic', false, null); break;
                case 'COLOR': document.execCommand('foreColor', false, 'red'); break;
                case 'SIZE': document.execCommand('fontSize', false, '5'); break;
            }
            closeMenu();
        }
    </script>
</body>
</html>
