<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    <style>
        /* Global: Disable selection everywhere by default */
        body { 
            transition: background 0.4s; font-family: sans-serif; margin: 0; 
            -webkit-user-select: none; user-select: none; 
            -webkit-touch-callout: none;
        }
        
        #nav-bar { height: 50px; background: #333; color: white; }
        
        /* Specific: Re-enable selection ONLY for the editable text area */
        #content-text { 
            font-size: 16px; padding: 20px; min-height: 100px; 
            -webkit-user-select: text; user-select: text; 
        }
        
        #target-zone { 
            height: 200px; border: 2px dashed #000; margin: 20px;
            display: flex; align-items: center; justify-content: center;
            /* Force disable selection and gestures */
            -webkit-user-select: none; user-select: none;
            touch-action: none;
        }

        #action-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #f9f9f9; border: 1px solid #ddd; padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; width: 85%; max-width: 320px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { padding: 10px; border: none; background: #e0e0e0; border-radius: 5px; font-size: 14px; }
        .close-btn { width: 100%; margin-top: 10px; background: #ff5e5e; color: white; }
    </style>
</head>
<body>
    <div id="nav-bar">Navigation Menu</div>
    <div id="content-text" contenteditable="true">Select this text to format it using the menu.</div>
    <div id="target-zone">Long-press to trigger Intent Menu.</div>

    <div id="action-menu">
        <h3>Browser Actions</h3>
        <div class="menu-grid">
            <button onclick="performAction('COPY')">Copy</button>
            <button onclick="performAction('PASTE')">Paste</button>
            <button onclick="performAction('SHARE')">Share</button>
            <button onclick="performAction('REFRESH')">Refresh</button>
            <button onclick="performAction('SELECT_ALL')">Select All</button>
            <button onclick="performAction('EXPORT_STATE')">Export State</button>
        </div>
        <h3>Formatting</h3>
        <div class="menu-grid">
            <button onclick="performAction('BOLD')">Bold</button>
            <button onclick="performAction('ITALIC')">Italic</button>
            <button onclick="performAction('COLOR')">Text Color</button>
            <button onclick="performAction('SIZE')">Font Size</button>
        </div>
        <button class="close-btn" onclick="closeMenu()">Close</button>
    </div>

    <script>
        // 1. Force-disable selection on the document
        document.addEventListener('selectstart', (e) => {
            if (e.target.id !== 'content-text') e.preventDefault();
        }, false);

        const worker = new Worker('worker.js');
        let isHolding = false;
        let touchStartTime = 0;
        const targetZone = document.getElementById('target-zone');

        targetZone.addEventListener('contextmenu', (e) => e.preventDefault(), false);
        targetZone.addEventListener('touchstart', () => { isHolding = true; touchStartTime = Date.now(); }, { passive: false });
        targetZone.addEventListener('touchend', () => { isHolding = false; document.body.className = "DEFAULT"; }, { passive: false });

        setInterval(() => {
            if (isHolding) {
                worker.postMessage({ type: 'CAPTURE_INTENT', data: { dwellDuration: Date.now() - touchStartTime, target: 'target-zone' } });
            }
        }, 500);

        worker.onmessage = (e) => {
            if (e.data.type === 'APPLY_LAYOUT' && e.data.layout.action === 'OPEN_MENU') {
                document.getElementById('action-menu').style.display = 'block';
            }
        };

        function closeMenu() { document.getElementById('action-menu').style.display = 'none'; }

        async function performAction(type) {
            const content = document.getElementById('content-text');
            content.focus();

            switch(type) {
                case 'COPY': document.execCommand('copy'); break;
                case 'PASTE':
                    try {
                        const text = await navigator.clipboard.readText();
                        document.execCommand('insertText', false, text);
                    } catch (err) { alert("Paste permission denied."); }
                    break;
                case 'SELECT_ALL': document.execCommand('selectAll', false, null); break;
                case 'REFRESH': location.reload(); break;
                case 'SHARE': if (navigator.share) navigator.share({title: document.title, url: window.location.href}); break;
                case 'BOLD': document.execCommand('bold', false, null); break;
                case 'ITALIC': document.execCommand('italic', false, null); break;
                case 'COLOR': 
                    const color = prompt("Enter color name:", "red");
                    if (color) document.execCommand('foreColor', false, color); 
                    break;
                case 'SIZE': 
                    const size = prompt("Enter font size (1-7):", "5");
                    if (size) document.execCommand('fontSize', false, size); 
                    break;
                case 'EXPORT_STATE':
                    const blob = new Blob([content.innerText], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'runtime-state.txt';
                    a.click(); URL.revokeObjectURL(url);
                    break;
            }
            closeMenu();
        }
    </script>
</body>
</html>
