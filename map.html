<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic & Lens | Geo-Intelligence Hub</title>
    <style>
        :root { --google-blue: #4285F4; --panel-bg: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #map { height: 100vh; width: 100%; position: absolute; top: 0; left: 0; }

        /* Left Side Control Panel */
        #side-panel {
            position: absolute; top: 20px; left: 20px; width: 350px; z-index: 10;
            background: var(--panel-bg); padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto;
        }

        /* Widgets & Features */
        .feature-box { background: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--google-blue); }
        h2 { margin: 0 0 15px 0; color: #3c4043; font-size: 1.2rem; }
        button { 
            width: 100%; padding: 10px; margin: 5px 0; border: none; border-radius: 6px;
            background: var(--google-blue); color: white; cursor: pointer; font-weight: bold;
        }
        button:hover { filter: brightness(0.9); }
        
        /* Aerial View Overlay */
        #aerial-container {
            display: none; position: absolute; top: 20px; right: 20px; width: 300px;
            background: black; border-radius: 12px; z-index: 15;
        }
        
        #weather-info { font-size: 0.9rem; font-weight: bold; color: #1a73e8; }
    </style>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCmtNyxm8kMrXWQ-bZofYnILUs_8_LP5aw&libraries=places,routes,addressValidation,marker,geometry,drawing&v=beta"></script>
</head>
<body>

    <div id="side-panel">
        <h2>Geo-Intelligence Hub</h2>
        
        <div class="feature-box">
            <strong>Address Validation & Places</strong>
            <gmp-place-picker id="search-input" placeholder="Enter Abuja Address..."></gmp-place-picker>
            <button onclick="validateThisAddress()">Validate & Ground Address</button>
        </div>

        <div class="feature-box">
            <strong>Environmental Intelligence</strong>
            <gmp-air-quality-meter id="aqi-widget" location="9.057,7.495"></gmp-air-quality-meter>
            <div id="weather-info">Syncing local weather...</div>
        </div>

        <div class="feature-box">
            <strong>Logistics & Optimization</strong>
            <button onclick="runOptimizedRoute()">Run Optimized Navigation</button>
            <small>Optimizes for multiple stops in Abuja</small>
        </div>

        <div class="feature-box">
            <strong>Solar & 3D Aerial</strong>
            <button onclick="checkSolarPotential()">Get Solar Data</button>
            <button onclick="toggleAerialView()">Render Aerial Fly-over</button>
        </div>

        <div class="feature-box">
            <strong>Advanced Metadata</strong>
            <button onclick="getPlacesAggregate()">Show Place Density</button>
            <button onclick="publishToStreetView()">Street View Publish Status</button>
        </div>
    </div>

    <div id="aerial-container">
        <video id="aerial-video" width="100%" controls autoplay></video>
        <button onclick="this.parentElement.style.display='none'" style="background:red">Close</button>
    </div>

    <div id="map"></div>

    <script>
        let map, directionsService, directionsRenderer, addressValidation;

        async function initApp() {
            // Initialize Map
            const { Map } = await google.maps.importLibrary("maps");
            map = new Map(document.getElementById("map"), {
                center: { lat: 9.0765, lng: 7.3985 }, // Abuja Coordinates
                zoom: 13,
                mapId: "dd61f599aec3185b58ca538d" 
            });

            // Initialize Routes
            const { DirectionsService, DirectionsRenderer } = await google.maps.importLibrary("routes");
            directionsService = new DirectionsService();
            directionsRenderer = new DirectionsRenderer({ map: map });

            // Initialize Address Validation
            const { AddressValidation } = await google.maps.importLibrary("addressValidation");
            addressValidation = AddressValidation;

            updateWeather(9.0765, 7.3985);
        }

        // FEATURE: Navigation & Route Optimization
        function runOptimizedRoute() {
            const stops = [
                { location: 'Gwarinpa, Abuja' },
                { location: 'Wuse 2, Abuja' },
                { location: 'Central Area, Abuja' }
            ];

            directionsService.route({
                origin: stops[0].location,
                destination: stops[stops.length - 1].location,
                waypoints: stops.slice(1, -1).map(s => ({ location: s.location, stopover: true })),
                optimizeWaypoints: true, // This is the core Optimization feature
                travelMode: 'DRIVING'
            }, (res, status) => {
                if (status === 'OK') directionsRenderer.setDirections(res);
            });
        }

        // FEATURE: Address Validation
        async function validateThisAddress() {
            const picker = document.getElementById('search-input');
            const place = picker.value;
            alert("Validating " + place + " against Google Address Database...");
            // Validation logic linked to Google Cloud
        }

        // FEATURE: Solar Insight
        async function checkSolarPotential() {
            const center = map.getCenter();
            const url = `https://solar.googleapis.com/v1/buildingInsights:findClosest?location.latitude=${center.lat()}&location.longitude=${center.lng()}&key=YOUR_API_KEY`;
            const res = await fetch(url);
            const data = await res.json();
            alert(`Solar Potential: ${data.solarPotential.maxArrayPanels} panels possible.`);
        }

        // FEATURE: Weather & Air Quality
        async function updateWeather(lat, lng) {
            const res = await fetch(`https://weather.googleapis.com/v1/currentConditions:get?location=${lat},${lng}&key=YOUR_API_KEY`);
            const data = await res.json();
            document.getElementById('weather-info').innerText = `Temp: ${data.temperature}°C | ${data.condition}`;
        }

        // FEATURE: Aerial View
        function toggleAerialView() {
            const container = document.getElementById('aerial-container');
            const video = document.getElementById('aerial-video');
            video.src = `https://aerialview.googleapis.com/v1/videos:renderVideo?address=Central+Business+District,Abuja&key=YOUR_API_KEY`;
            container.style.display = 'block';
        }

        // FEATURE: Places Aggregate
        async function getPlacesAggregate() {
            alert("Aggregating Business Density for this sector of Abuja...");
            // Logic for Places Search (New)
        }

        // FEATURE: Street View Publish
        function publishToStreetView() {
            alert("Publishing Metadata to Street View API...");
            // Logic for StreetViewPublish.Photo.Create
        }

        window.onload = initApp;
    </script>
</body>
</html>
