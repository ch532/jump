<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic & Lens | Geo-Intelligence Hub</title>
    <style>
        :root { --google-blue: #4285F4; --panel-bg: rgba(255, 255, 255, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background-color: #aad3df; }
        
        /* Map takes full background */
        #map { height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 1; }

        /* Left Side Control Panel */
        #side-panel {
            position: absolute; top: 20px; left: 20px; width: 320px; z-index: 10;
            background: var(--panel-bg); padding: 15px; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-height: 85vh; overflow-y: auto;
        }

        .feature-box { background: #f8f9fa; border-radius: 8px; padding: 10px; margin-bottom: 10px; border-left: 4px solid var(--google-blue); font-size: 0.85rem; }
        h2 { margin: 0 0 10px 0; color: #3c4043; font-size: 1.1rem; }
        button { 
            width: 100%; padding: 8px; margin: 4px 0; border: none; border-radius: 6px;
            background: var(--google-blue); color: white; cursor: pointer; font-weight: bold; font-size: 0.8rem;
        }
        button:hover { filter: brightness(0.9); }
        
        #aerial-container {
            display: none; position: absolute; top: 20px; right: 20px; width: 280px;
            background: black; border-radius: 12px; z-index: 15; padding: 5px;
        }
        
        #weather-info { font-size: 0.85rem; font-weight: bold; color: #1a73e8; margin-top: 5px; }
    </style>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCmtNyxm8kMrXWQ-bZofYnILUs_8_LP5aw&libraries=places,routes,addressValidation,marker,geometry,drawing&v=beta"></script>
</head>
<body>

    <div id="side-panel">
        <h2>Geo-Intelligence Hub</h2>
        
        <div class="feature-box">
            <strong>Address Validation & Places</strong>
            <gmp-place-picker id="search-input" placeholder="Enter Abuja Address..."></gmp-place-picker>
            <button onclick="validateThisAddress()">Validate & Ground Address</button>
        </div>

        <div class="feature-box">
            <strong>Environmental Intelligence</strong>
            <gmp-air-quality-meter id="aqi-widget" location="9.057,7.495"></gmp-air-quality-meter>
            <div id="weather-info">Syncing local weather...</div>
        </div>

        <div class="feature-box">
            <strong>Logistics & Optimization</strong>
            <button onclick="runOptimizedRoute()">Run Optimized Navigation</button>
            <small>Optimizes for multiple stops in Abuja</small>
        </div>

        <div class="feature-box">
            <strong>Solar & 3D Aerial</strong>
            <button onclick="checkSolarPotential()">Get Solar Data</button>
            <button onclick="toggleAerialView()">Render Aerial Fly-over</button>
        </div>

        <div class="feature-box">
            <strong>Advanced Metadata</strong>
            <button onclick="getPlacesAggregate()">Show Place Density</button>
            <button onclick="publishToStreetView()">Street View Publish Status</button>
        </div>
    </div>

    <div id="aerial-container">
        <video id="aerial-video" width="100%" controls autoplay></video>
        <button onclick="this.parentElement.style.display='none'" style="background:red">Close</button>
    </div>

    <div id="map"></div>

    <script>
        let map, directionsService, directionsRenderer, addressValidation;

        async function initApp() {
            const { Map } = await google.maps.importLibrary("maps");
            
            // SHOW THE WORLD: Center on Equator, Zoom 2
            map = new Map(document.getElementById("map"), {
                center: { lat: 20, lng: 0 }, 
                zoom: 2, 
                mapId: "dd61f599aec3185b58ca538d",
                mapTypeControl: true,
                streetViewControl: true,
                fullscreenControl: false,
                minZoom: 2
            });

            const { DirectionsService, DirectionsRenderer } = await google.maps.importLibrary("routes");
            directionsService = new DirectionsService();
            directionsRenderer = new DirectionsRenderer({ 
                map: map,
                polylineOptions: { strokeColor: "#4285F4", strokeWeight: 5 }
            });

            const { AddressValidation } = await google.maps.importLibrary("addressValidation");
            addressValidation = AddressValidation;

            updateWeather(9.0765, 7.3985);
        }

        function runOptimizedRoute() {
            // Flies to Abuja and shows route
            map.flyTo({center: { lat: 9.0765, lng: 7.3985 }, zoom: 13}); 
            const stops = [
                { location: 'Gwarinpa, Abuja' },
                { location: 'Wuse 2, Abuja' },
                { location: 'Central Area, Abuja' }
            ];

            directionsService.route({
                origin: stops[0].location,
                destination: stops[stops.length - 1].location,
                waypoints: stops.slice(1, -1).map(s => ({ location: s.location, stopover: true })),
                optimizeWaypoints: true,
                travelMode: 'DRIVING'
            }, (res, status) => {
                if (status === 'OK') directionsRenderer.setDirections(res);
            });
        }

        async function validateThisAddress() {
            alert("Checking Google Address Database for validation...");
        }

        async function checkSolarPotential() {
            const center = map.getCenter();
            const url = `https://solar.googleapis.com/v1/buildingInsights:findClosest?location.latitude=${center.lat()}&location.longitude=${center.lng()}&key=AIzaSyCmtNyxm8kMrXWQ-bZofYnILUs_8_LP5aw`;
            const res = await fetch(url);
            const data = await res.json();
            if(data.solarPotential) {
                alert(`Solar Potential: ${data.solarPotential.maxArrayPanels} panels possible.`);
            } else {
                alert("Move map to a building to see solar data.");
            }
        }

        async function updateWeather(lat, lng) {
            const res = await fetch(`https://weather.googleapis.com/v1/currentConditions:get?location=${lat},${lng}&key=AIzaSyCmtNyxm8kMrXWQ-bZofYnILUs_8_LP5aw`);
            const data = await res.json();
            if(data.temperature) {
                document.getElementById('weather-info').innerText = `Abuja: ${data.temperature}°C | ${data.condition}`;
            }
        }

        function toggleAerialView() {
            const container = document.getElementById('aerial-container');
            const video = document.getElementById('aerial-video');
            video.src = `https://aerialview.googleapis.com/v1/videos:renderVideo?address=Central+Business+District,Abuja&key=AIzaSyCmtNyxm8kMrXWQ-bZofYnILUs_8_LP5aw`;
            container.style.display = 'block';
        }

        async function getPlacesAggregate() {
            alert("Aggregating sector business density...");
        }

        function publishToStreetView() {
            alert("Street View Publish Service: Ready for 360 metadata.");
        }

        window.onload = initApp;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</body>
</html>
