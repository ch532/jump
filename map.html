<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic & Lens | Global Geo-Hub</title>
    <style>
        /* Map takes up 100% of the screen with no grey borders */
        html, body, #map { height: 100%; margin: 0; padding: 0; background-color: #aad3df; }
        
        /* High-end Integrated Marker Styling */
        .map-feature-card {
            background: white; border-radius: 12px; padding: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-bottom: 4px solid #4285F4;
            min-width: 180px; font-family: 'Roboto', sans-serif;
        }
        .feature-title { font-weight: bold; color: #1a73e8; font-size: 13px; margin-bottom: 8px; }
        .feature-btn { 
            background: #1a73e8; color: white; border: none; padding: 8px; 
            width: 100%; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 500;
        }
        .feature-btn:hover { background: #1557b0; }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCmtNyxm8kMrXWQ-bZofYnILUs_8_LP5aw&libraries=marker,places,routes,addressValidation&v=beta"></script>
</head>
<body>

    <div id="map"></div>

    <script>
        async function initMap() {
            const { Map } = await google.maps.importLibrary("maps");
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

            const map = new Map(document.getElementById("map"), {
                center: { lat: 20, lng: 10 }, 
                zoom: 3, // Starts at the "Wonderful" Global view
                mapId: "dd61f599aec3185b58ca538d", // Your ID for clear Google styling
                mapTypeControl: true,
                streetViewControl: true,
                fullscreenControl: true,
                backgroundColor: '#aad3df',
                isFractionalZoomEnabled: true
            });

            // Features are bound to the ground. User finds them when they zoom in.
            const dataPoints = [
                { 
                    lat: 9.057, lng: 7.495, 
                    title: "Environmental Intelligence", 
                    content: '<gmp-air-quality-meter location="9.057,7.495"></gmp-air-quality-meter>' 
                },
                { 
                    lat: 9.0765, lng: 7.3985, 
                    title: "Solar Potential", 
                    content: '<button class="feature-btn" onclick="alert(\'Analyzing Energy...\')">Get Solar Data</button>' 
                },
                { 
                    lat: 9.0667, lng: 7.4833, 
                    title: "Logistics Optimization", 
                    content: '<button class="feature-btn" onclick="alert(\'Optimizing Routes...\')">Run Navigation</button>' 
                }
            ];

            // Create markers that are part of the map itself
            dataPoints.forEach(point => {
                const markerDiv = document.createElement('div');
                markerDiv.innerHTML = `
                    <div class="map-feature-card">
                        <div class="feature-title">${point.title}</div>
                        ${point.content}
                    </div>`;
                
                new AdvancedMarkerElement({
                    map: map,
                    position: { lat: point.lat, lng: point.lng },
                    content: markerDiv,
                });
            });
        }

        window.onload = initMap;
    </script>
</body>
</html>
