    <script>
      // Feature: Optimization
      async function runOptimizedRoute() {
          alert("Optimizing logistics path between Escondido Grill locations...");
          // Logic for waypoint optimization
      }

      // Feature: Solar
      async function getSolarData() {
          const key = CONFIGURATION.mapsApiKey;
          const url = `https://solar.googleapis.com/v1/buildingInsights:findClosest?location.latitude=37.7866&location.longitude=-122.4133&key=${key}`;
          const res = await fetch(url);
          const data = await res.json();
          alert(`Solar capacity: ${data.solarPotential.maxArrayPanels} panels possible here.`);
      }

      // Feature: Weather
      async function updateWeather(lat, lng) {
          const key = CONFIGURATION.mapsApiKey;
          const res = await fetch(`https://weather.googleapis.com/v1/currentConditions:get?location=${lat},${lng}&key=${key}`);
          const data = await res.json();
          if(data.temperature) {
              document.getElementById('weather-display').innerText = `Current: ${data.temperature}°C | ${data.condition}`;
          }
      }

      // Feature: Aerial View
      function showAerialView() {
          const box = document.getElementById('aerial-vid-box');
          const vid = document.getElementById('aerial-v');
          vid.src = `https://aerialview.googleapis.com/v1/videos:renderVideo?address=601+Geary+St,San+Francisco&key=${CONFIGURATION.mapsApiKey}`;
          box.style.display = 'block';
      }
