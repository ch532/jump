        <div id="my-native-feed">Loading Dynamic News...</div>
    </div>
</main>

<script>
// Robust, Real-Time Dynamic Google News Feed using Native XML Parsing
async function loadFeed() {
    const rssUrl = "https://news.google.com/rss?hl=en-NG&gl=NG&ceid=NG:en";
    
    // Using a reliable, open-source CORS proxy to fetch raw XML data
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
    
    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        
        // Parse the raw XML string using the browser's native engine
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(data.contents, "text/xml");
        const items = xmlDoc.getElementsByTagName("item");
        
        const feedContainer = document.getElementById('my-native-feed');
        feedContainer.innerHTML = ''; 

        if (items.length === 0) {
            feedContainer.innerHTML = "No recent environmental reports found.";
            return;
        }

        // Display up to 15 real-time news items dynamically
        const maxItems = Math.min(items.length, 15);
        for (let i = 0; i < maxItems; i++) {
            const item = items[i];
            const title = item.getElementsByTagName("title")[0]?.textContent || "Untitled Report";
            const link = item.getElementsByTagName("link")[0]?.textContent || "#";

            const div = document.createElement('div');
            div.className = 'news-item';
            div.innerHTML = `<h3>${title}</h3><a href="${link}" target="_blank" rel="noopener">Read Full Report</a>`;
            feedContainer.appendChild(div);

            // Symmetrically inject your AdSense unit every 4 news items
            if ((i + 1) % 4 === 0) {
                const adDiv = document.createElement('div');
                adDiv.className = 'adsense-infeed-space';
                adDiv.innerHTML = `
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-format="fluid"
                         data-ad-layout-key="-6r+di+5g-2m-8y"
                         data-ad-client="ca-pub-8877351541430254"
                         data-ad-slot="5656610761"></ins>
                `;
                feedContainer.appendChild(adDiv);
                
                // Safely push to AdSense stack
                try {
                    (adsbygoogle = window.adsbygoogle || []).push({});
                } catch (adError) {
                    console.log("AdSense layout queued.");
                }
            }
        }
    } catch (e) {
        document.getElementById('my-native-feed').innerHTML = "Unable to load live feed. Please refresh.";
    }
}

// Run the engine
loadFeed();
</script>
