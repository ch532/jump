        if (data.adHtml || data.html_snippet) {
          const tempDiv = document.createElement("div");
          tempDiv.innerHTML = data.adHtml || data.html_snippet;
          document.body.appendChild(tempDiv);
          const scripts = tempDiv.querySelectorAll("script");
          scripts.forEach(oldScript => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            if (oldScript.parentNode) oldScript.parentNode.replaceChild(newScript, oldScript);
          });

          if (adInfo.destination_url) window.open(adInfo.destination_url, '_blank');

      })
      .catch(err => console.error("Connectgold Ad Error:", err));
  }

<script>
async function loadFeed() {
    const rssUrl = "http://feeds.bbci.co.uk/news/world/rss.xml";
    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
    
    try {
        const response = await fetch(apiUrl);
        const data = await response.json();
        const feedContainer = document.getElementById('my-native-feed');
        feedContainer.innerHTML = ''; 

        data.items.slice(0, 12).forEach((article, index) => {
            const div = document.createElement('div');
            div.className = 'news-item';
            div.innerHTML = `
                <span class="news-item-tag">${article.author || "Global News"}</span>
                <h3>${article.title}</h3>
                <div class="news-item-meta">Published: ${new Date(article.pubDate).toLocaleDateString()}</div>
                ${article.thumbnail ? `<img src="${article.thumbnail}" class="news-item-img">` : ''}
                <p>${article.description || "Read more at source."}</p>
                <div class="context-note">SkyIPworld Insight: Aggregated report for real-time awareness and event documentation.</div>
                <a href="${article.link}" target="_blank" rel="noopener">Read Full Report</a>
            `;
            feedContainer.appendChild(div);
        });
    } catch (e) {
        document.getElementById('my-native-feed').innerHTML = "Unable to load feed.";
    }
}
loadFeed();
</script>
