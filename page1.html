<script>
async function loadFeed() {
    const rssUrl = "http://feeds.bbci.co.uk/news/world/rss.xml";
    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
    
    try {
        const response = await fetch(apiUrl);
        const data = await response.json();
        
        const feedContainer = document.getElementById('my-native-feed');
        feedContainer.innerHTML = ''; 

        data.items.slice(0, 12).forEach((article, index) => {
            const div = document.createElement('div');
            div.className = 'news-item';
            div.innerHTML = `
                <span class="news-item-tag">${article.author || "Global News"}</span>
                <h3>${article.title}</h3>
                <div class="news-item-meta">Published: ${new Date(article.pubDate).toLocaleDateString()}</div>
                ${article.thumbnail ? `<img src="${article.thumbnail}" class="news-item-img">` : ''}
                <p>${article.description || "Read more at source."}</p>
                <a href="${article.link}" target="_blank" rel="noopener">Read Full Report</a>
            `;
            feedContainer.appendChild(div);

            if ((index + 1) % 3 === 0) {
                const adDiv = document.createElement('div');
                adDiv.className = 'adsense-infeed-space';
                adDiv.innerHTML = `<ins class="adsbygoogle" style="display:block" data-ad-format="fluid" data-ad-layout-key="-6r+di+5g-2m-8y" data-ad-client="ca-pub-8877351541430254" data-ad-slot="5656610761"></ins>`;
                feedContainer.appendChild(adDiv);
                try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
            }
        });
    } catch (e) {
        document.getElementById('my-native-feed').innerHTML = "Unable to load feed.";
    }
}
loadFeed();
</script>
