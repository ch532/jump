    <div id="my-native-feed">Loading feed...</div>

<script>
async function loadLiveDevArticles() {
    const feedContainer = document.getElementById('my-native-feed');
    try {
        const response = await fetch("https://dev.to/api/articles?per_page=12");
        const articles = await response.json();
        feedContainer.innerHTML = ''; 
        
        articles.forEach((article, index) => {
            // Render Article Card
            const articleCardHTML = `
                <div class="article-card">
                    <span class="article-topic-tag">#${article.tag_list ? article.tag_list[0] : 'Tech'}</span>
                    <h3 class="article-title">${article.title}</h3>
                    <div class="article-body">${article.description}</div>
                    <a href="${article.url}" target="_blank" class="btn-read-more">Read Full Report</a>
                </div>
            `;
            feedContainer.insertAdjacentHTML('beforeend', articleCardHTML);

            // Inject AdSense every 3 posts (index 2, 5, 8...)
            if ((index + 1) % 3 === 0) {
                const adContainer = document.createElement('div');
                adContainer.className = 'adsense-in-article-wrapper';
                adContainer.innerHTML = `
                `;
                feedContainer.insertAdjacentHTML('beforeend', adContainer.innerHTML);
            }
        });
    } catch (e) {
        feedContainer.innerHTML = "<p>Intelligence feed currently refreshing.</p>";
    }
}
loadLiveDevArticles();
</script>
