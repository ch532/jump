<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Location Intelligence</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #status { font-size: 16px; line-height: 1.5; border: 1px solid #333; padding: 15px; }
    </style>
    <!-- Include TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <!-- Include Eruda for mobile debugging -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>
<body>
    <div id="status">Initializing AI Location Intelligence...</div>

    <script>
        let locationHistory = [];
        let lastGeocodeTime = 0;
        let lastLocationName = "Detecting locality...";
        const statusEl = document.getElementById('status');

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(async (position) => {
                const { latitude, longitude, speed } = position.coords;
                const now = Date.now();
                
                // 1. Throttle Geocoding (Once every 45 seconds)
                if (now - lastGeocodeTime > 45000) {
                    lastGeocodeTime = now;
                    try {
                        const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`);
                        const data = await response.json();
                        lastLocationName = data.locality || data.city || "Unknown Location";
                    } catch (err) {
                        console.error("Geocoding failed:", err);
                    }
                }

                // 2. Activity Detection
                let activity = "Stationary";
                if (speed > 2.5) activity = "Driving / High-Speed Transit";
                else if (speed > 0.5) activity = "Walking / Active Movement";

                // 3. AI Anomaly Logic
                const currentPoint = [latitude, longitude, speed || 0];
                locationHistory.push(currentPoint);
                if (locationHistory.length > 10) locationHistory.shift();

                let anomalyAlert = "";
                if (locationHistory.length >= 5) {
                    const avgLat = locationHistory.reduce((a, b) => a + b[0], 0) / locationHistory.length;
                    const avgLng = locationHistory.reduce((a, b) => a + b[1], 0) / locationHistory.length;
                    const distance = Math.sqrt(Math.pow(latitude - avgLat, 2) + Math.pow(longitude - avgLng, 2));
                    if (distance > 0.001) anomalyAlert = " | ALERT: Pattern Shift";
                }

                // 4. Update UI
                statusEl.innerHTML = `Location: ${lastLocationName}<br>Coords: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}<br>AI Activity: <strong>${activity}</strong>${anomalyAlert}`;
                
            }, (err) => {
                console.error("GPS Error: " + err.message);
                statusEl.innerText = "Error: " + err.message;
            }, { enableHighAccuracy: true });
        } else {
            statusEl.innerText = "Geolocation not supported.";
        }
    </script>
</body>
</html>
