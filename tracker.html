<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Live Intelligence Terminal</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #0f0; font-family: monospace; }
        #status { padding: 10px; border-bottom: 1px solid #333; background: #111; font-size: 14px; }
        /* Ensuring the map has a defined height is critical for mobile rendering */
        #map { height: 70vh; width: 100%; } 
        .alert { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">Initializing Terminal...</div>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        try {
            const map = L.map('map').setView([9.0765, 7.4913], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            let marker = L.marker([9.0765, 7.4913]).addTo(marker);
            
            // Force resize after load
            setTimeout(() => { map.invalidateSize(); }, 500);

            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    const latLng = [pos.coords.latitude, pos.coords.longitude];
                    marker.setLatLng(latLng);
                    document.getElementById('status').innerHTML = `Lat: ${latLng[0].toFixed(4)} | Lng: ${latLng[1].toFixed(4)}`;
                }, (err) => {
                    document.getElementById('status').innerText = "GPS Error: " + err.message;
                }, { enableHighAccuracy: true });
            }
        } catch (e) {
            document.getElementById('status').innerText = "Script Error: " + e.message;
        }
    </script>
</body>
</html>
