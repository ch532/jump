<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live AI Tracking Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 10px; margin: 0; }
        #status { font-size: 14px; border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
        #map { height: 400px; width: 100%; border-radius: 8px; border: 2px solid #333; }
        .map-container { max-width: 600px; margin: 20px auto; border-radius: 8px; overflow: hidden; border: 2px solid #333; }
    </style>
</head>
<body>
    <div id="status">Initializing Map & AI...</div>
    <div id="map"></div>

    <script>
        // 1. Initialize Map at World View (Zoom 2)
        const map = L.map('map').setView([9.0765, 7.4913], 2); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let marker = L.marker([9.0765, 7.4913]).addTo(map);
        let hasZoomed = false; // Flag to zoom only once

        // 2. Track Location
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((position) => {
                const { latitude, longitude, speed } = position.coords;
                const latLng = [latitude, longitude];

                marker.setLatLng(latLng);
                
                // Zoom in to user location once on start
                if (!hasZoomed) {
                    map.setView(latLng, 13);
                    hasZoomed = true;
                } else {
                    map.panTo(latLng);
                }

                let activity = speed > 2.5 ? "Driving" : (speed > 0.5 ? "Walking" : "Stationary");
                document.getElementById('status').innerHTML = `Location: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}<br>AI Activity: <strong>${activity}</strong>`;
                
            }, (err) => console.error(err), { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
