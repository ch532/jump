<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR-SKYE | Secure Upload</title>
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        #upload-form { display: none; } /* Hidden until logged in */
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        #final-link { font-weight: 600; color: #c5a059; word-break: break-all; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Sign-in Button -->
        <div id="g_id_onload"
             data-client_id="46181700573-ioktcosvfphls3ug89nv2v61prvhqo32.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>

        <!-- Protected Form -->
        <div id="upload-form">
            <h1>Upload Product</h1>
            <input type="text" id="product-name" placeholder="Product Name">
            <input type="url" id="product-url" placeholder="Paste actual file URL here">
            <p id="final-link"></p>
        </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            const user = parseJwt(response.credential);
            // REPLACE with your actual email
            if (user.email === "trustconnect713@gmail.com") {
                document.getElementById('upload-form').style.display = 'block';
                document.querySelector('.g_id_signin').style.display = 'none';
            } else {
                alert("Access Denied: Not authorized.");
            }
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => 
                '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        // Auto-generate link as you type
        const urlInput = document.getElementById('product-url');
        const linkDisplay = document.getElementById('final-link');

        urlInput.addEventListener('input', () => {
            const url = urlInput.value;
            if (url) {
                const finalLink = `https://chyke.online/billing.html?file=${encodeURIComponent(url)}`;
                linkDisplay.innerText = "Generated Link: " + finalLink;
            } else {
                linkDisplay.innerText = "";
            }
        });
    </script>
</body>
</html>
