<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR-SKYE | Secure Upload</title>
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        #upload-form { display: none; } /* Hidden by default */
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border: none; border-radius: 12px; background: #1a1a1a; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Sign-in Button -->
        <div id="g_id_onload"
             data-client_id="46181700573-ioktcosvfphls3ug89nv2v61prvhqo32.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>

        <!-- Protected Form -->
        <div id="upload-form">
            <h1>Upload Product</h1>
            <input type="text" id="product-name" placeholder="Product Name">
            <input type="url" id="product-url" placeholder="Paste file URL">
            <button id="generate-btn">Generate Payment Link</button>
            <p id="final-link" style="margin-top:20px; word-break: break-all;"></p>
        </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            const user = parseJwt(response.credential);
            // Replace with your actual email
            if (user.email === "your-email@gmail.com") {
                document.getElementById('upload-form').style.display = 'block';
                document.querySelector('.g_id_signin').style.display = 'none';
            } else {
                alert("Access Denied: Not authorized.");
            }
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => 
                '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }

        document.getElementById('generate-btn').onclick = () => {
            const name = document.getElementById('product-name').value;
            const url = document.getElementById('product-url').value;
            if (!name || !url) return alert("Fill all fields");
            
            const finalLink = `https://chyke.online/billing.html?file=${encodeURIComponent(url)}`;
            document.getElementById('final-link').innerText = "Link: " + finalLink;
        };
    </script>
</body>
</html>
